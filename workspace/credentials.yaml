# Credential manifest — machine-readable map of vault keys this agent needs.
# ─────────────────────────────────────────────────────────────────────────
# The Pioneer Desktop wizard reads this at onboarding time to prompt for
# each vault key. The zeroclaw daemon reads it at boot to verify all
# required keys are resolvable before accepting requests.
#
# ⚠️  SECRETS ARE NEVER STORED IN THIS FILE. This is a declaration of
#     WHICH keys the agent needs — values live only in the vault.
#
# CI rejects any entry containing `value`, `secret`, `token`, or `key`
# fields. See .github/workflows/validate-config.yml.
# ─────────────────────────────────────────────────────────────────────────

credentials: []

