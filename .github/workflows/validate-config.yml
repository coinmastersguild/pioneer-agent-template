name: validate-config

on:
  pull_request:
    paths:
      - 'config.toml'
      - 'tools.d/**'
      - 'workspace/IDENTITY.json'
      - 'workspace/credentials.yaml'
      - '.env.example'
  push:
    branches: [main, master, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validators
        run: pip install tomli pyyaml

      - name: Reject committed .env
        run: |
          if [ -f .env ]; then
            echo "::error::.env is committed — this is a secrets leak. Remove it."
            exit 1
          fi
          echo ".env is correctly absent."

      - name: Validate config.toml
        run: |
          python - <<'PY'
          import tomli
          with open("config.toml","rb") as f:
              tomli.load(f)
          print("config.toml: OK")
          PY

      - name: Validate tools.d/*.toml + unique tool names
        run: |
          python - <<'PY'
          import tomli, glob, sys
          names = {}
          ok = True
          for path in sorted(glob.glob("tools.d/*.toml")):
              with open(path,"rb") as f:
                  data = tomli.load(f)
              for t in data.get("http_tools", []):
                  n = t.get("name")
                  if not n:
                      print(f"{path}: tool without name"); ok = False; continue
                  if n in names:
                      print(f"{path}: duplicate tool '{n}' (also in {names[n]})"); ok = False
                  else:
                      names[n] = path
              print(f"{path}: OK ({len(data.get('http_tools',[]))} tools)")
          sys.exit(0 if ok else 1)
          PY

      - name: Validate IDENTITY.json (AIEOS v1.1)
        run: |
          python - <<'PY'
          import json
          with open("workspace/IDENTITY.json") as f:
              data = json.load(f)
          required = ["identity","psychology","linguistics","motivations",
                      "capabilities","physicality","history","interests"]
          missing = [s for s in required if s not in data]
          if missing:
              print(f"IDENTITY.json missing sections: {missing}")
              raise SystemExit(1)
          print("IDENTITY.json: OK")
          PY

      - name: Validate credentials.yaml (if present)
        run: |
          if [ ! -f workspace/credentials.yaml ]; then
            echo "workspace/credentials.yaml not present — skipping (optional)"
            exit 0
          fi
          python - <<'PY'
          import yaml, sys
          with open("workspace/credentials.yaml") as f:
              data = yaml.safe_load(f) or {}
          creds = data.get("credentials", [])
          if not isinstance(creds, list):
              print("credentials.yaml: 'credentials' must be a list"); sys.exit(1)
          seen = set()
          for c in creds:
              for field in ("vault_key", "description"):
                  if field not in c:
                      print(f"credentials.yaml: entry missing '{field}': {c}"); sys.exit(1)
              if c["vault_key"] in seen:
                  print(f"credentials.yaml: duplicate vault_key '{c['vault_key']}'"); sys.exit(1)
              seen.add(c["vault_key"])
              forbidden = {"value", "secret", "token", "key"}
              for f in forbidden & set(c.keys()):
                  print(f"credentials.yaml: entry for '{c['vault_key']}' has forbidden field '{f}' — secrets must NOT appear here")
                  sys.exit(1)
          print(f"credentials.yaml: OK ({len(creds)} credential declarations)")
          PY
